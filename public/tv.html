<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Mode — ระบบแจ้งยอดบริจาค BOK2569</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/css/main.css" rel="stylesheet">
  <link href="/css/tv.css" rel="stylesheet">
</head>
<body class="tv-body">
  <div class="tv-layout">
    <!-- Sound Toggle Button -->
    <button class="tv-sound-toggle active" id="sound-toggle" title="เปิด/ปิดเสียงประกาศ">
      <i class="fas fa-volume-up" id="sound-icon"></i>
    </button>

    <!-- LEFT -->
    <div class="tv-left">
      <div class="tv-header">
        <img src="/img/logo_standard.png" style="height: 60px; width: 60px; object-fit: contain; margin-right: 15px;">
        <div>
          <div class="tv-school-name" id="tv-school">โรงเรียนบ้านบกหนองทันน้ำ</div>
          <div class="tv-project-name" id="tv-project">ผ้าป่าสามัคคีเพื่อการศึกษา ปี 2569</div>
        </div>
      </div>
      <div class="tv-total-section">
        <div class="tv-total-label">ยอดบริจาครวม</div>
        <div class="tv-total-amount font-en animate-glow" id="tv-total">0.00</div>
        <div class="tv-total-unit">บาท</div>
      </div>

      <!-- Top 3 Donors (ยอดบริจาคสะสมสูงสุด 3 อันดับแรก) -->
      <div class="tv-top3-container">
        <div class="tv-top3-title"><i class="fas fa-trophy text-gold"></i> ยอดบริจาคสะสมสูงสุด 3 อันดับแรก</div>
        <div class="tv-podium-wrapper" id="tv-top3-list">
          <div class="text-center py-2 text-muted" style="font-size: 1.2vw;">กำลังโหลดข้อมูล...</div>
        </div>
      </div>

      <div class="tv-clock">
        <div class="tv-time font-en" id="tv-clock">00:00:00</div>
        <div class="tv-date" id="tv-date"></div>
      </div>
    </div>
    <!-- RIGHT -->
    <div class="tv-right">
      <div class="tv-right-header">
        <span class="live-dot"></span>
        <span>ผู้บริจาคล่าสุด</span>
      </div>
      <div class="tv-donation-list" id="tv-donation-list">
        <div class="empty-state"><i class="fas fa-hand-holding-heart"></i><p>ยังไม่มีรายการ</p></div>
      </div>
    </div>
  </div>
  <!-- TV Popup -->
  <div id="popup-container"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/popup.js"></script>
  <script src="/js/tts.js"></script>
  <script>
    const API_BASE = window.location.origin + '/api';
    async function fetchAPI(endpoint) {
      const res = await fetch(API_BASE + endpoint);
      return await res.json();
    }
    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('tv-clock').textContent = now.toLocaleTimeString('th-TH');
      document.getElementById('tv-date').textContent = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Load data
    async function loadTV() {
      try {
        const [stats, donations, top10] = await Promise.all([
          fetchAPI('/dashboard/summary'),
          fetchAPI('/donations/latest'),
          fetchAPI('/dashboard/top10')
        ]);
        if (stats.data) {
          document.getElementById('tv-total').textContent = formatCurrency(stats.data.totalAmount);
        }
        if (donations.data && donations.data.length > 0) {
          const list = document.getElementById('tv-donation-list');
          list.innerHTML = donations.data.map((d, i) => `
            <div class="tv-donation-item" style="animation-delay: ${i * 0.05}s">
              <div class="tv-donor-name">${d.donorName}</div>
              <div class="tv-donor-amount font-en">${formatCurrency(d.amount)} <small>บาท</small></div>
            </div>
          `).join('');
        }
        if (top10.data) {
          renderTVTop3(top10.data);
        }
      } catch(e) { console.log('TV load skipped'); }
    }

    function renderTVTop3(topList) {
      const container = document.getElementById('tv-top3-list');
      if (!container) return;
      
      const top3 = topList.slice(0, 3);
      while (top3.length < 3) {
        top3.push({ _id: '-', totalAmount: 0 });
      }
      
      const ranks = [
        { class: 'tv-podium-gold', crown: '👑', label: 'อันดับ 1' },
        { class: 'tv-podium-silver', crown: '🥈', label: 'อันดับ 2' },
        { class: 'tv-podium-bronze', crown: '🥉', label: 'อันดับ 3' }
      ];
      
      container.innerHTML = top3.map((d, index) => {
        const r = ranks[index];
        const name = d._id === '-' ? 'ว่าง' : d._id;
        const amountText = d.totalAmount > 0 ? `${formatCurrency(d.totalAmount)} <small>บาท</small>` : '-';
        
        return `
          <div class="tv-podium-card ${r.class}">
            <div class="tv-podium-crown">${r.crown}</div>
            <div class="tv-podium-name">${name}</div>
            <div class="tv-podium-amount">${amountText}</div>
          </div>
        `;
      }).join('');
    }
    loadTV();

    // TV Mode Alert Queue (คิวสำหรับแสดงป๊อปอัพกลางจอและพูดประกาศสลิป)
    const tvQueue = [];
    let isProcessingTVQueue = false;

    function queueTVAlert(donation) {
      tvQueue.push(donation);
      if (!isProcessingTVQueue) {
        processTVQueue();
      }
    }

    function processTVQueue() {
      if (tvQueue.length === 0) {
        isProcessingTVQueue = false;
        return;
      }
      isProcessingTVQueue = true;
      const donation = tvQueue.shift();
      showTVPopupAndSpeak(donation, () => {
        // เมื่อเสียงประกาศพูดจบและปิดป๊อปอัพแล้ว ค่อยดึงยอดถัดไปในคิวขึ้นมาแสดงผลต่อ
        processTVQueue();
      });
    }

    function showTVPopupAndSpeak(donation, callback) {
      // 1. เล่นเสียง Chime นำทางก่อนพูด
      if (typeof playChime === 'function') playChime();

      // 2. เด้งป๊อปอัพการ์ดขนาดใหญ่กลางจอภาพ
      const container = document.getElementById('popup-container');
      if (!container) {
        if (callback) callback();
        return;
      }

      const popup = document.createElement('div');
      popup.id = 'tv-popup';
      popup.innerHTML = `
        <div class="tv-popup-card">
          <div class="tv-popup-emoji">🎉</div>
          <div class="tv-popup-title">ร่วมอนุโมทนาบุญ</div>
          <div class="tv-popup-donor">${donation.donorName}</div>
          <div class="tv-popup-amount">${formatCurrency(donation.amount)} <small>บาท</small></div>
        </div>
      `;
      container.appendChild(popup);

      // บังคับให้บราวเซอร์เรนเดอร์สไตล์เริ่มต้นก่อน แอดคลาสอนิเมชันเด้งขึ้นมา
      popup.offsetHeight;
      popup.classList.add('show');

      // 3. เริ่มพูดสังเคราะห์เสียง (TTS)
      if ('speechSynthesis' in window && soundEnabled) {
        // ล้างเสียงพูดเก่าๆ ที่ค้างอยู่ (ถ้ามี)
        window.speechSynthesis.cancel();
        
        const text = `ขออนุโมทนาบุญ คุณ ${donation.donorName} ร่วมบริจาค เป็นจำนวนเงิน ${donation.amount} บาท ขอขอบพระคุณครับ`;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'th-TH';
        utterance.rate = 0.85; // ปรับให้พูดจังหวะเป็นธรรมชาติและชัดเจน
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        // เลือกเสียงผู้พูดภาษาไทย
        const voices = window.speechSynthesis.getVoices();
        const thaiVoice = voices.find(v => v.lang.startsWith('th'));
        if (thaiVoice) utterance.voice = thaiVoice;

        // เมื่อพูดเสร็จ ให้รอ 2 วินาทีเพื่อให้เห็นชื่อคนโอนชัดๆ แล้วทำการปิดป๊อปอัพและไปชื่อถัดไป
        utterance.onend = () => {
          setTimeout(closeTVPopup, 2000);
        };

        utterance.onerror = () => {
          setTimeout(closeTVPopup, 3000);
        };

        window.speechSynthesis.speak(utterance);
      } else {
        // หากไม่รองรับระบบเสียง หรือผู้ใช้ปิดเสียง ให้แสดงค้างไว้ 5 วินาทีแล้วทำการปิดป๊อปอัพ
        setTimeout(closeTVPopup, 5000);
      }

      function closeTVPopup() {
        popup.classList.remove('show');
        setTimeout(() => {
          popup.remove();
          if (callback) callback();
        }, 500); // รอเฟดเอาท์อนิเมชันให้จบ
      }
    }

    // Socket
    const socket = io(window.location.origin);
    socket.on('new_donation', (donation) => {
      loadTV();
      queueTVAlert(donation); // ใส่คิวเด้งป๊อปอัพเสียงพูดกลางจอทีละยอดตามลำดับ
    });
    socket.on('donation_verified', () => loadTV());

    // ESC to go back
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.location.href = '/';
    });
    // Auto fullscreen
    document.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    }, { once: true });
  </script>
</body>
</html>
