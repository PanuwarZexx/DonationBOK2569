<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการผู้ใช้ — BOK2569</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/css/main.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
  <link href="/css/responsive.css" rel="stylesheet">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar-glass" id="sidebar">
    <div class="sidebar-header"><img src="/img/logo_standard.png" style="height: 36px; width: 36px; object-fit: contain; border-radius: 50%; margin-right: 8px;"><div class="sidebar-title">บริจาค BOK2569<small>ระบบจัดการ</small></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">เมนูหลัก</div>
      <a href="/dashboard.html" class="nav-link-custom"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="/donations.html" class="nav-link-custom"><i class="fas fa-list"></i> รายการบริจาค</a>
      <a href="/add-donation.html" class="nav-link-custom"><i class="fas fa-plus-circle"></i> เพิ่มรายการ</a>
      <a href="/search.html" class="nav-link-custom"><i class="fas fa-search"></i> ค้นหา</a>
      <div class="nav-section-title">รายงาน</div>
      <a href="/reports.html" class="nav-link-custom"><i class="fas fa-chart-pie"></i> รายงาน</a>
      <a href="/certificates.html" class="nav-link-custom"><i class="fas fa-certificate"></i> ใบอนุโมทนาบัตร</a>
      <div class="nav-section-title">ผู้ดูแลระบบ</div>
      <a href="/users.html" class="nav-link-custom active"><i class="fas fa-users-cog"></i> จัดการผู้ใช้</a>
      <a href="/settings.html" class="nav-link-custom"><i class="fas fa-cog"></i> ตั้งค่า</a>
      <a href="/logs.html" class="nav-link-custom"><i class="fas fa-history"></i> Log</a>
      <a href="/backup.html" class="nav-link-custom"><i class="fas fa-database"></i> Backup</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" class="nav-link-custom"><i class="fas fa-globe"></i> ดูหน้าเว็บ</a>
      <a href="#" class="nav-link-custom" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</a>
    </div>
  </aside>

  <div class="content-with-sidebar">
    <div class="admin-topbar">
      <h5 class="mb-0"><i class="fas fa-users-cog text-gold"></i> จัดการผู้ใช้งานระบบ</h5>
      <button class="btn-gold btn-sm" data-bs-toggle="modal" data-bs-target="#addUserModal"><i class="fas fa-plus-circle"></i> เพิ่มผู้ใช้งาน</button>
    </div>
    <div class="admin-content">
      <div class="glass-card">
        <div class="table-responsive">
          <table class="table-dark-custom">
            <thead>
              <tr>
                <th>ชื่อผู้ใช้</th>
                <th>ชื่อ-สกุล</th>
                <th>บทบาท</th>
                <th>สถานะการใช้งาน</th>
                <th class="text-center">การจัดการ</th>
              </tr>
            </thead>
            <tbody id="users-table-body">
              <tr><td colspan="5" class="text-center" style="color:var(--color-text-muted)">กำลังโหลด...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Add User Modal -->
  <div class="modal fade modal-dark" id="addUserModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-plus-circle text-gold"></i> เพิ่มผู้ใช้งานใหม่</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="add-user-form">
          <div class="modal-body">
            <div class="mb-3">
              <label>Username</label>
              <input type="text" class="form-control-dark" id="add-username" required placeholder="ภาษาอังกฤษหรือตัวเลข">
            </div>
            <div class="mb-3">
              <label>Password</label>
              <input type="password" class="form-control-dark" id="add-password" required placeholder="อย่างน้อย 6 ตัวอักษร">
            </div>
            <div class="mb-3">
              <label>ชื่อ-นามสกุล</label>
              <input type="text" class="form-control-dark" id="add-fullname" required placeholder="ชื่อ-นามสกุลผู้ใช้งาน">
            </div>
            <div class="mb-3">
              <label>บทบาทผู้ใช้งาน</label>
              <select class="form-select-dark" id="add-role">
                <option value="staff">เจ้าหน้าที่ (Staff)</option>
                <option value="admin">ผู้ดูแลระบบ (Admin)</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn-glass" data-bs-dismiss="modal">ยกเลิก</button>
            <button type="submit" class="btn-gold">บันทึก</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script>const API_BASE = window.location.origin + '/api';</script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth() || !isAdmin()) { window.location.href = '/dashboard.html'; return; }
      loadUsers();

      document.getElementById('add-user-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
          username: document.getElementById('add-username').value,
          password: document.getElementById('add-password').value,
          fullName: document.getElementById('add-fullname').value,
          role: document.getElementById('add-role').value
        };
        try {
          const token = getToken();
          const res = await fetch(`${API_BASE}/users`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(body)
          });
          const result = await res.json();
          if (result.success) {
            alert('เพิ่มผู้ใช้สำเร็จ!');
            e.target.reset();
            bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
            loadUsers();
          } else { alert(result.message); }
        } catch(err) { alert('เกิดข้อผิดพลาด: ' + err.message); }
      });
    });

    async function loadUsers() {
      try {
        const token = getToken();
        const res = await fetch(`${API_BASE}/users`, { headers: { 'Authorization': `Bearer ${token}` } });
        const result = await res.json();
        if (result.success) {
          renderUsers(result.data);
        }
      } catch (err) {
        console.error(err);
      }
    }

    function renderUsers(users) {
      const body = document.getElementById('users-table-body');
      body.innerHTML = users.map(u => `
        <tr>
          <td class="font-en fw-semibold">${u.username}</td>
          <td>${u.fullName}</td>
          <td><span class="badge-status ${u.role === 'admin' ? 'badge-verified' : 'badge-pending_review'}">${u.role === 'admin' ? 'Admin' : 'Staff'}</span></td>
          <td>
            <span class="badge-status ${u.isActive ? 'badge-verified' : 'badge-cancel'}">${u.isActive ? 'เปิดใช้งาน' : 'ระงับใช้งาน'}</span>
          </td>
          <td class="text-center">
            <button class="btn-danger-soft btn-icon btn-sm" onclick="deactivateUser('${u._id}')" ${!u.isActive ? 'disabled' : ''}><i class="fas fa-trash-alt"></i></button>
          </td>
        </tr>
      `).join('');
    }

    async function deactivateUser(id) {
      if (!confirm('ต้องการระงับการใช้งานผู้ใช้งานรายนี้ใช่หรือไม่?')) return;
      try {
        const token = getToken();
        const res = await fetch(`${API_BASE}/users/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await res.json();
        if (result.success) {
          loadUsers();
        }
      } catch(err) {
        alert(err.message);
      }
    }
  </script>
</body>
</html>
