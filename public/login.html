<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — ระบบแจ้งยอดบริจาค BOK2569</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/css/main.css" rel="stylesheet">
  <style>
    .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-card { width: 100%; max-width: 420px; }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo .logo-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--color-gold), var(--color-gold-dark)); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 1rem; }
    .login-error { background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.3); color: var(--color-danger); border-radius: var(--radius-sm); padding: 0.75rem 1rem; font-size: var(--font-size-sm); display: none; margin-bottom: 1rem; }
    .login-footer { text-align: center; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card glass-card-gold animate-slide-in-up">
      <div class="login-logo">
        <img src="/img/logo_standard.png" style="height: 90px; width: 90px; object-fit: contain; margin-bottom: 1rem;">
        <h4>เข้าสู่ระบบ</h4>
        <p>ระบบแจ้งยอดบริจาคผ้าป่าสามัคคี</p>
      </div>
      <div class="login-error" id="login-error"></div>
      <form id="login-form">
        <div class="mb-3">
          <label for="username">ชื่อผู้ใช้</label>
          <input type="text" class="form-control-dark" id="username" placeholder="กรอก Username" required autofocus>
        </div>
        <div class="mb-3">
          <label for="password">รหัสผ่าน</label>
          <input type="password" class="form-control-dark" id="password" placeholder="กรอก Password" required>
        </div>
        <button type="submit" class="btn-gold w-100" style="padding: 0.85rem;">
          <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
        </button>
      </form>
      <div class="login-footer">
        <a href="/" class="text-gold"><i class="fas fa-arrow-left"></i> กลับหน้าหลัก</a>
      </div>
    </div>
  </div>
  <script>const API_BASE = window.location.origin + '/api';</script>
  <script src="/js/auth.js"></script>
</body>
</html>
