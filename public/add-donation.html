<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เพิ่มรายการบริจาค — BOK2569</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/css/main.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
  <link href="/css/responsive.css" rel="stylesheet">
</head>
<body>
  <!-- Sidebar (same as dashboard) -->
  <aside class="sidebar-glass" id="sidebar">
    <div class="sidebar-header"><img src="/img/logo_standard.png" style="height: 36px; width: 36px; object-fit: contain; border-radius: 50%; margin-right: 8px;"><div class="sidebar-title">บริจาค BOK2569<small>ระบบจัดการ</small></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">เมนูหลัก</div>
      <a href="/dashboard.html" class="nav-link-custom"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="/donations.html" class="nav-link-custom"><i class="fas fa-list"></i> รายการบริจาค</a>
      <a href="/add-donation.html" class="nav-link-custom active"><i class="fas fa-plus-circle"></i> เพิ่มรายการ</a>
      <a href="/search.html" class="nav-link-custom"><i class="fas fa-search"></i> ค้นหา</a>
      <div class="nav-section-title">รายงาน</div>
      <a href="/reports.html" class="nav-link-custom"><i class="fas fa-chart-pie"></i> รายงาน</a>
      <a href="/certificates.html" class="nav-link-custom"><i class="fas fa-certificate"></i> ใบอนุโมทนาบัตร</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" class="nav-link-custom"><i class="fas fa-globe"></i> ดูหน้าเว็บ</a>
      <a href="#" class="nav-link-custom" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</a>
    </div>
  </aside>

  <div class="content-with-sidebar">
    <div class="admin-topbar">
      <h5 class="mb-0"><i class="fas fa-plus-circle text-gold"></i> เพิ่มรายการบริจาค</h5>
    </div>
    <div class="admin-content">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="glass-card-gold">
            <div id="success-msg" style="display:none" class="mb-3" style="background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);border-radius:8px;padding:1rem;color:var(--color-success)">
              <i class="fas fa-check-circle"></i> บันทึกสำเร็จ! รายการจะปรากฏบนหน้าเว็บทันที
            </div>
            <form id="add-donation-form">
              <div class="row g-3">
                <div class="col-md-6">
                  <label>ชื่อผู้บริจาค *</label>
                  <input type="text" class="form-control-dark" id="donorName" required placeholder="ชื่อ-สกุล">
                </div>
                <div class="col-md-6">
                  <label>จำนวนเงิน (บาท) *</label>
                  <input type="number" class="form-control-dark" id="amount" required min="1" step="0.01" placeholder="0.00">
                </div>
                <div class="col-md-6">
                  <label>ช่องทาง *</label>
                  <select class="form-select-dark" id="channel">
                    <option value="cash">💵 เงินสด</option>
                    <option value="check">📄 เช็ค</option>
                    <option value="transfer">💳 โอนเงิน</option>
                  </select>
                </div>
                <div class="col-md-6" id="check-number-group" style="display:none">
                  <label>เลขเช็ค</label>
                  <input type="text" class="form-control-dark" id="checkNumber" placeholder="เลขเช็ค">
                </div>
                <div class="col-md-6">
                  <label>ประเภท</label>
                  <select class="form-select-dark" id="category">
                    <option value="general">ทั่วไป</option>
                    <option value="alumni">ศิษย์เก่า</option>
                    <option value="parent">ผู้ปกครอง</option>
                    <option value="company">บริษัท/องค์กร</option>
                    <option value="other">อื่นๆ</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label>หมู่บ้าน</label>
                  <input type="text" class="form-control-dark" id="village" placeholder="หมู่บ้าน">
                </div>
                <div class="col-md-6">
                  <label>ตำบล</label>
                  <input type="text" class="form-control-dark" id="subDistrict" placeholder="ตำบล">
                </div>
                <div class="col-12">
                  <label>หมายเหตุ</label>
                  <textarea class="form-control-dark" id="note" rows="2" placeholder="หมายเหตุ (ถ้ามี)"></textarea>
                </div>
                <div class="col-12">
                  <button type="submit" class="btn-gold" style="padding: 0.85rem 2rem;">
                    <i class="fas fa-save"></i> บันทึกรายการ
                  </button>
                  <button type="reset" class="btn-glass ms-2" style="padding: 0.85rem 2rem;">
                    <i class="fas fa-redo"></i> ล้างฟอร์ม
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script>const API_BASE = window.location.origin + '/api';</script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth()) return;
      document.getElementById('channel').addEventListener('change', (e) => {
        document.getElementById('check-number-group').style.display = e.target.value === 'check' ? 'block' : 'none';
      });
      document.getElementById('add-donation-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
          donorName: document.getElementById('donorName').value,
          amount: parseFloat(document.getElementById('amount').value),
          channel: document.getElementById('channel').value,
          category: document.getElementById('category').value,
          village: document.getElementById('village').value,
          subDistrict: document.getElementById('subDistrict').value,
          note: document.getElementById('note').value,
          checkNumber: document.getElementById('checkNumber').value
        };
        try {
          const res = await fetch(API_BASE + '/donations', {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
            body: JSON.stringify(body)
          });
          const data = await res.json();
          if (data.success) {
            document.getElementById('success-msg').style.display = 'block';
            e.target.reset();
            setTimeout(() => document.getElementById('success-msg').style.display = 'none', 5000);
          } else { alert(data.message || 'เกิดข้อผิดพลาด'); }
        } catch(err) { alert('เกิดข้อผิดพลาด: ' + err.message); }
      });
    });
  </script>
</body>
</html>
