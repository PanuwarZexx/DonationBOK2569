  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/css/main.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
  <link href="/css/responsive.css" rel="stylesheet">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar-glass" id="sidebar">
    <div class="sidebar-header"><img src="/img/logo_standard.png" style="height: 36px; width: 36px; object-fit: contain; border-radius: 50%; margin-right: 8px;"><div class="sidebar-title">บริจาค BOK2569<small>ระบบจัดการ</small></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">เมนูหลัก</div>
      <a href="/dashboard.html" class="nav-link-custom"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="/donations.html" class="nav-link-custom"><i class="fas fa-list"></i> รายการบริจาค</a>
      <a href="/add-donation.html" class="nav-link-custom"><i class="fas fa-plus-circle"></i> เพิ่มรายการ</a>
      <a href="/search.html" class="nav-link-custom"><i class="fas fa-search"></i> ค้นหา</a>
      <div class="nav-section-title">รายงาน</div>
      <a href="/reports.html" class="nav-link-custom"><i class="fas fa-chart-pie"></i> รายงาน</a>
      <a href="/certificates.html" class="nav-link-custom"><i class="fas fa-certificate"></i> ใบอนุโมทนาบัตร</a>
      <div class="nav-section-title">ผู้ดูแลระบบ</div>
      <a href="/users.html" class="nav-link-custom"><i class="fas fa-users-cog"></i> จัดการผู้ใช้</a>
      <a href="/settings.html" class="nav-link-custom"><i class="fas fa-cog"></i> ตั้งค่า</a>
      <a href="/logs.html" class="nav-link-custom"><i class="fas fa-history"></i> Log</a>
      <a href="/backup.html" class="nav-link-custom active"><i class="fas fa-database"></i> Backup</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" class="nav-link-custom"><i class="fas fa-globe"></i> ดูหน้าเว็บ</a>
      <a href="#" class="nav-link-custom" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</a>
    </div>
  </aside>

  <div class="content-with-sidebar">
    <div class="admin-topbar">
      <h5 class="mb-0"><i class="fas fa-database text-gold"></i> ระบบสำรองและกู้คืนข้อมูล (Backup / Restore)</h5>
      <button class="btn-gold btn-sm" onclick="createBackup()"><i class="fas fa-plus-circle"></i> สำรองข้อมูลเดี๋ยวนี้</button>
    </div>
    <div class="admin-content">
      <div class="glass-card">
        <h5>รายการข้อมูลที่เคยสำรองไว้</h5>
        <hr style="border-color:var(--color-border)">
        <div class="table-responsive">
          <table class="table-dark-custom">
            <thead>
              <tr>
                <th>ชื่อข้อมูลสำรอง</th>
                <th class="text-center">กู้คืนข้อมูล</th>
              </tr>
            </thead>
            <tbody id="backup-table-body">
              <tr><td colspan="2" class="text-center" style="color:var(--color-text-muted)">กำลังโหลด...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script>const API_BASE = window.location.origin + '/api';</script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth() || !isAdmin()) { window.location.href = '/dashboard.html'; return; }
      loadBackups();
    });

    async function loadBackups() {
      try {
        const token = getToken();
        const res = await fetch(`${API_BASE}/backup/list`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await res.json();
        if (result.success) {
          renderBackups(result.data);
        }
      } catch (err) {
        console.error(err);
      }
    }

    function renderBackups(backups) {
      const body = document.getElementById('backup-table-body');
      if (!backups.length) {
        body.innerHTML = '<tr><td colspan="2" class="text-center" style="color:var(--color-text-muted)">ไม่มีไฟล์สำรองข้อมูล</td></tr>';
        return;
      }
      body.innerHTML = backups.map(b => `
        <tr>
          <td class="font-en fw-semibold text-gold">${b}</td>
          <td class="text-center">
            <button class="btn-success-soft btn-sm py-1 px-3" onclick="restoreBackup('${b}')"><i class="fas fa-undo"></i> กู้คืน (Restore)</button>
          </td>
        </tr>
      `).join('');
    }

    async function createBackup() {
      try {
        const token = getToken();
        const res = await fetch(`${API_BASE}/backup/create`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await res.json();
        if (result.success) {
          alert('สำรองข้อมูลเรียบร้อยแล้ว!');
          loadBackups();
        }
      } catch (err) {
        alert(err.message);
      }
    }

    async function restoreBackup(name) {
      if (!confirm(`คุณแน่ใจหรือไม่ที่จะกู้คืนข้อมูลสำรอง "${name}"?\nการกู้คืนจะทับซ้อนและเขียนทับข้อมูลปัจจุบันทั้งหมด!`)) return;
      try {
        const token = getToken();
        const res = await fetch(`${API_BASE}/backup/restore`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ backupName: name })
        });
        const result = await res.json();
        if (result.success) {
          alert('กู้คืนข้อมูลสำรองสำเร็จแล้ว!');
          loadBackups();
        }
      } catch (err) {
        alert(err.message);
      }
    }
  </script>
</body>
</html>
