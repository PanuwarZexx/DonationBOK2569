<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่าระบบ — BOK2569</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/css/main.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
  <link href="/css/responsive.css" rel="stylesheet">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar-glass" id="sidebar">
    <div class="sidebar-header"><img src="/img/logo_standard.png" style="height: 36px; width: 36px; object-fit: contain; border-radius: 50%; margin-right: 8px;"><div class="sidebar-title">บริจาค BOK2569<small>ระบบจัดการ</small></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">เมนูหลัก</div>
      <a href="/dashboard.html" class="nav-link-custom"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="/donations.html" class="nav-link-custom"><i class="fas fa-list"></i> รายการบริจาค</a>
      <a href="/add-donation.html" class="nav-link-custom"><i class="fas fa-plus-circle"></i> เพิ่มรายการ</a>
      <a href="/search.html" class="nav-link-custom"><i class="fas fa-search"></i> ค้นหา</a>
      <div class="nav-section-title">รายงาน</div>
      <a href="/reports.html" class="nav-link-custom"><i class="fas fa-chart-pie"></i> รายงาน</a>
      <a href="/certificates.html" class="nav-link-custom"><i class="fas fa-certificate"></i> ใบอนุโมทนาบัตร</a>
      <div class="nav-section-title">ผู้ดูแลระบบ</div>
      <a href="/users.html" class="nav-link-custom"><i class="fas fa-users-cog"></i> จัดการผู้ใช้</a>
      <a href="/settings.html" class="nav-link-custom active"><i class="fas fa-cog"></i> ตั้งค่า</a>
      <a href="/logs.html" class="nav-link-custom"><i class="fas fa-history"></i> Log</a>
      <a href="/backup.html" class="nav-link-custom"><i class="fas fa-database"></i> Backup</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" class="nav-link-custom"><i class="fas fa-globe"></i> ดูหน้าเว็บ</a>
      <a href="#" class="nav-link-custom" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</a>
    </div>
  </aside>

  <div class="content-with-sidebar">
    <div class="admin-topbar">
      <h5 class="mb-0"><i class="fas fa-cog text-gold"></i> ตั้งค่าระบบ</h5>
    </div>
    <div class="admin-content">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="glass-card-gold">
            <form id="settings-form">
              <div class="row g-3">
                <div class="col-12">
                  <h5><i class="fas fa-school text-gold"></i> ข้อมูลโครงการผ้าป่า</h5>
                  <hr style="border-color:var(--color-border)">
                </div>
                <div class="col-md-6">
                  <label>ชื่อโรงเรียน</label>
                  <input type="text" class="form-control-dark" id="schoolName" required>
                </div>
                <div class="col-md-6">
                  <label>เป้าหมายยอดบริจาค (บาท)</label>
                  <input type="number" class="form-control-dark" id="goalAmount" required>
                </div>
                <div class="col-md-6">
                  <label>ปีที่จัดกิจกรรม</label>
                  <input type="text" class="form-control-dark" id="year" required>
                </div>
                <div class="col-md-6">
                  <label>ชื่อโครงการ</label>
                  <input type="text" class="form-control-dark" id="projectName" required>
                </div>

                <div class="col-12 mt-4">
                  <h5><i class="fas fa-qrcode text-gold"></i> ตั้งค่าบัญชีและพร้อมเพย์</h5>
                  <hr style="border-color:var(--color-border)">
                </div>
                <div class="col-md-6">
                  <label>หมายเลขพร้อมเพย์ (PromptPay ID)</label>
                  <input type="text" class="form-control-dark" id="promptPayId">
                </div>
                <div class="col-12">
                  <label>ข้อความประกาศ/ประชาสัมพันธ์</label>
                  <textarea class="form-control-dark" id="announcementText" rows="3"></textarea>
                </div>

                <div class="col-12 mt-4">
                  <button type="submit" class="btn-gold" style="padding: 0.85rem 2rem;">
                    <i class="fas fa-save"></i> บันทึกการตั้งค่า
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script>const API_BASE = window.location.origin + '/api';</script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth() || !isAdmin()) { window.location.href = '/dashboard.html'; return; }
      loadSettings();

      document.getElementById('settings-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
          schoolName: document.getElementById('schoolName').value,
          goalAmount: parseFloat(document.getElementById('goalAmount').value),
          year: document.getElementById('year').value,
          projectName: document.getElementById('projectName').value,
          promptPayId: document.getElementById('promptPayId').value,
          announcementText: document.getElementById('announcementText').value
        };
        try {
          const token = getToken();
          const res = await fetch(`${API_BASE}/settings`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(body)
          });
          const result = await res.json();
          if (result.success) {
            alert('บันทึกการตั้งค่าสำเร็จ!');
            loadSettings();
          } else { alert(result.message); }
        } catch(err) { alert('เกิดข้อผิดพลาด: ' + err.message); }
      });
    });

    async function loadSettings() {
      try {
        const token = getToken();
        const res = await fetch(`${API_BASE}/settings`, { headers: { 'Authorization': `Bearer ${token}` } });
        const result = await res.json();
        if (result.success) {
          const d = result.data;
          document.getElementById('schoolName').value = d.schoolName || '';
          document.getElementById('goalAmount').value = d.goalAmount || 0;
          document.getElementById('year').value = d.year || '';
          document.getElementById('projectName').value = d.projectName || '';
          document.getElementById('promptPayId').value = d.promptPayId || '';
          document.getElementById('announcementText').value = d.announcementText || '';
        }
      } catch(err) {
        console.error(err);
      }
    }
  </script>
</body>
</html>
