<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="/css/main.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
  <link href="/css/responsive.css" rel="stylesheet">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar-glass" id="sidebar">
    <div class="sidebar-header"><img src="/img/logo_standard.png" style="height: 36px; width: 36px; object-fit: contain; border-radius: 50%; margin-right: 8px;"><div class="sidebar-title">บริจาค BOK2569<small>ระบบจัดการ</small></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">เมนูหลัก</div>
      <a href="/dashboard.html" class="nav-link-custom"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="/donations.html" class="nav-link-custom"><i class="fas fa-list"></i> รายการบริจาค</a>
      <a href="/add-donation.html" class="nav-link-custom"><i class="fas fa-plus-circle"></i> เพิ่มรายการ</a>
      <a href="/search.html" class="nav-link-custom"><i class="fas fa-search"></i> ค้นหา</a>
      <div class="nav-section-title">รายงาน</div>
      <a href="/reports.html" class="nav-link-custom"><i class="fas fa-chart-pie"></i> รายงาน</a>
      <a href="/certificates.html" class="nav-link-custom"><i class="fas fa-certificate"></i> ใบอนุโมทนาบัตร</a>
      <div class="nav-section-title">ผู้ดูแลระบบ</div>
      <a href="/users.html" class="nav-link-custom"><i class="fas fa-users-cog"></i> จัดการผู้ใช้</a>
      <a href="/settings.html" class="nav-link-custom"><i class="fas fa-cog"></i> ตั้งค่า</a>
      <a href="/logs.html" class="nav-link-custom active"><i class="fas fa-history"></i> Log</a>
      <a href="/backup.html" class="nav-link-custom"><i class="fas fa-database"></i> Backup</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" class="nav-link-custom"><i class="fas fa-globe"></i> ดูหน้าเว็บ</a>
      <a href="#" class="nav-link-custom" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</a>
    </div>
  </aside>

  <div class="content-with-sidebar">
    <div class="admin-topbar">
      <h5 class="mb-0"><i class="fas fa-history text-gold"></i> ประวัติการใช้งานระบบ (Audit Log)</h5>
      <button class="btn-danger-soft btn-sm" onclick="clearLogs()"><i class="fas fa-trash-alt"></i> ล้าง Log เก่า</button>
    </div>
    <div class="admin-content">
      <div class="glass-card">
        <div class="table-responsive">
          <table class="table-dark-custom">
            <thead>
              <tr>
                <th>เวลา</th>
                <th>ผู้ใช้</th>
                <th>การกระทำ</th>
                <th>รายละเอียด</th>
                <th>IP Address</th>
              </tr>
            </thead>
            <tbody id="logs-table-body">
              <tr><td colspan="5" class="text-center" style="color:var(--color-text-muted)">กำลังโหลด...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="logs-pagination" class="pagination-custom"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script>const API_BASE = window.location.origin + '/api';</script>
  <script src="/js/auth.js"></script>
  <script>
    let logsPage = 1;
    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth() || !isAdmin()) { window.location.href = '/dashboard.html'; return; }
      loadLogs();
    });

    async function loadLogs() {
      try {
        const token = getToken();
        const res = await fetch(`${API_BASE}/logs?page=${logsPage}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await res.json();
        if (result.success) {
          renderLogs(result.data);
          renderLogsPagination(result.pagination);
        }
      } catch (err) {
        console.error(err);
      }
    }

    function renderLogs(logs) {
      const body = document.getElementById('logs-table-body');
      if (!logs.length) {
        body.innerHTML = '<tr><td colspan="5" class="text-center" style="color:var(--color-text-muted)">ไม่มีข้อมูล Log</td></tr>';
        return;
      }
      body.innerHTML = logs.map(l => `
        <tr>
          <td class="font-en">${formatDate(l.createdAt)} ${formatTime(l.createdAt)}</td>
          <td><span class="fw-semibold">${l.username || 'System'}</span></td>
          <td><span class="badge-status badge-pending_review">${l.action}</span></td>
          <td>${l.details || '-'}</td>
          <td class="font-en">${l.ip || '-'}</td>
        </tr>
      `).join('');
    }

    function renderLogsPagination(p) {
      const pag = document.getElementById('logs-pagination');
      if (p.pages <= 1) { pag.innerHTML = ''; return; }
      let html = '';
      for (let i = 1; i <= p.pages; i++) {
        html += `<button class="page-btn ${i === p.page ? 'active' : ''}" onclick="changeLogsPage(${i})">${i}</button>`;
      }
      pag.innerHTML = html;
    }

    function changeLogsPage(page) {
      logsPage = page;
      loadLogs();
    }

    async function clearLogs() {
      if (!confirm('ต้องการล้างประวัติการทำรายการที่เก่ากว่า 30 วันใช่หรือไม่?')) return;
      try {
        const token = getToken();
        const res = await fetch(`${API_BASE}/logs?days=30`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await res.json();
        if (result.success) {
          alert(result.message);
          loadLogs();
        }
      } catch(err) {
        alert(err.message);
      }
    }
  </script>
</body>
</html>
